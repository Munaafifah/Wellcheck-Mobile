plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.example.session"
    compileSdk = 35
    ndkVersion = "27.0.12077973"  // Update this line
    
    defaultConfig {
        applicationId = "com.example.session"
        minSdk = 23
        targetSdk = 35
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = 17
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
        }
    }
}

dependencies {
    implementation 'com.google.android.material:material:1.5.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
}

flutter {
    source = "../.."
}

// Copy APK to Flutter expected location after build (workaround for space in username path)
android.applicationVariants.configureEach { variant ->
    def variantName = variant.name.capitalize()
    tasks.named("assemble${variantName}").configure {
        doLast {
            def flutterApkDir = new File(rootProject.rootDir.parentFile, "build/app/outputs/flutter-apk")
            flutterApkDir.mkdirs()
            def srcDir = new File("${rootProject.buildDir}/app/outputs/flutter-apk")
            if (srcDir.exists()) {
                copy {
                    from srcDir
                    into flutterApkDir
                    include "*.apk"
                }
            }
        }
    }
}